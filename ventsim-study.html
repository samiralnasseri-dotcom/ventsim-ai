<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VentSim — Clinical Simulation Study | Universiti Malaya 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');
:root{
  --bg:#050d14;--bg2:#081520;--panel:#0a1a27;
  --border:#0e2a3f;--border2:#1a3a55;
  --cyan:#00e5ff;--green:#00e676;--amber:#ffd740;--red:#ff5252;
  --text:#e0f2f1;--text2:#90a4ae;--text3:#546e7a;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;}

/* ── BOX — original unchanged ── */
.box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:36px 32px;width:100%;max-width:420px;margin:20px;}
.logo{font-family:var(--sans);font-size:2rem;font-weight:800;color:var(--cyan);letter-spacing:-1px;margin-bottom:4px;}
.tagline{font-family:var(--mono);font-size:.65rem;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:24px;}
.label{font-size:.75rem;color:var(--text2);margin-bottom:8px;}
.inp{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:12px 16px;color:var(--text);font-family:var(--mono);font-size:1rem;outline:none;text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:12px;}
.inp:focus{border-color:var(--cyan);}
.btn{width:100%;background:linear-gradient(135deg,var(--cyan),#00b8d4);color:#000;font-family:var(--mono);font-size:.8rem;font-weight:700;padding:13px;border:none;border-radius:6px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover{opacity:.9;}
.err{color:var(--red);font-family:var(--mono);font-size:.73rem;margin-top:6px;min-height:18px;text-align:center;}
.info{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);font-size:.72rem;color:var(--text3);text-align:center;line-height:1.8;}

/* ── SPINNER (replaces plain loading text) ── */
.spinner{width:13px;height:13px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FORMAT HINT ── */
.fmt-hint{font-family:var(--mono);font-size:.65rem;text-align:center;min-height:16px;margin-top:-8px;margin-bottom:8px;color:transparent;transition:color .2s}
.fmt-hint.ok {color:var(--green)}
.fmt-hint.bad{color:var(--amber)}

/* ── RESUME BANNER ── */
.resume{display:none;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.25);border-radius:6px;padding:8px 12px;margin-bottom:14px;font-family:var(--mono);font-size:.7rem;color:var(--green);align-items:center;justify-content:space-between;gap:8px}
.resume.on{display:flex}
.resume-pid{color:#fff;font-weight:600}
.resume-btn{background:rgba(0,230,118,.2);border:1px solid rgba(0,230,118,.4);color:var(--green);font-family:var(--mono);font-size:.65rem;font-weight:600;padding:3px 10px;border-radius:4px;cursor:pointer;letter-spacing:.5px}

/* ── EXPERT LINK ── */
.expert-link{display:block;text-align:center;margin-top:10px;font-family:var(--mono);font-size:.65rem;color:var(--text3);text-decoration:none;letter-spacing:.5px;transition:color .2s}
.expert-link:hover{color:var(--cyan)}

/* ── ALARM BANNER (fixed top) ── */
.alarm-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:500;color:#fff;font-family:var(--mono);font-weight:600;font-size:.72rem;letter-spacing:1px;padding:7px 18px;align-items:center;justify-content:space-between;gap:12px}
.alarm-banner.critical {display:flex;background:#dc2626;animation:aflash .8s infinite}
.alarm-banner.warning  {display:flex;background:#b45309;animation:aflash 1.5s infinite}
.alarm-banner.escalated{display:flex;background:#7f1d1d;animation:aflash .3s infinite}
.alarm-banner.silenced {display:flex;background:#374151;animation:none}
@keyframes aflash{0%,100%{opacity:1}50%{opacity:.75}}
.alarm-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sil-cd{font-family:var(--mono);font-size:.7rem;color:rgba(255,255,255,.85);display:none;min-width:40px}
.alarm-silence{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;font-family:var(--mono);font-size:.65rem;font-weight:600;padding:3px 10px;border-radius:4px;cursor:pointer;letter-spacing:.5px}
.alarm-log-lnk{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-family:var(--mono);font-size:.62rem;padding:2px 8px;border-radius:4px;cursor:pointer;letter-spacing:.5px}

/* ── RESOLVED FLASH ── */
.res-flash{display:none;position:fixed;top:0;left:0;right:0;z-index:510;background:rgba(0,230,118,.1);border-bottom:2px solid var(--green);color:var(--green);font-family:var(--mono);font-size:.7rem;letter-spacing:1px;padding:6px 18px;text-align:center}
.res-flash.show{display:block;animation:rfade 2.5s forwards}
@keyframes rfade{0%{opacity:1}75%{opacity:1}100%{opacity:0}}

/* ── ALARM LOG PANEL ── */
.alarm-log{display:none;position:fixed;top:0;right:0;width:260px;bottom:0;z-index:490;background:var(--bg2);border-left:1px solid var(--border2);flex-direction:column;overflow:hidden}
.alarm-log.open{display:flex}
.alg-hdr{flex-shrink:0;padding:10px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.alg-title{font-family:var(--mono);font-weight:600;font-size:.72rem;color:var(--cyan);letter-spacing:1px}
.alg-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 6px}
.alg-list{flex:1;overflow-y:auto;padding:8px}
.alg-entry{background:var(--panel);border-radius:5px;border-left:3px solid transparent;padding:7px 9px;margin-bottom:6px}
.alg-entry.critical{border-left-color:var(--red)}
.alg-entry.warning {border-left-color:var(--amber)}
.alg-entry.resolved{border-left-color:var(--green)}
.alg-entry.silenced{border-left-color:#6b7280}
.alg-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.alg-name{font-family:var(--mono);font-size:.68rem;color:var(--text)}
.alg-badge{font-size:.58rem;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-weight:600;letter-spacing:.5px}
.alg-badge.critical{background:rgba(255,82,82,.2);color:var(--red)}
.alg-badge.warning {background:rgba(255,215,64,.15);color:var(--amber)}
.alg-badge.resolved{background:rgba(0,230,118,.15);color:var(--green)}
.alg-badge.silenced{background:rgba(107,114,128,.2);color:#9ca3af}
.alg-bot{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.6rem}
.alg-val{color:var(--text2)}.alg-ts{color:var(--text3)}
</style>
</head>
<body>

<!-- ALARM BANNER -->
<div class="alarm-banner" id="alarm-banner">
  <span id="alarm-txt"></span>
  <div class="alarm-right">
    <span class="sil-cd" id="sil-cd"></span>
    <button class="alarm-log-lnk" onclick="toggleLog()">LOG ▸</button>
    <button class="alarm-silence" onclick="silenceAlarm()">SILENCE 2 MIN</button>
  </div>
</div>

<!-- RESOLVED FLASH -->
<div class="res-flash" id="res-flash">✓ &nbsp;ALARM RESOLVED — parameters normalising</div>

<!-- ALARM LOG PANEL -->
<div class="alarm-log" id="alarm-log">
  <div class="alg-hdr">
    <span class="alg-title">ALARM LOG</span>
    <button class="alg-close" onclick="toggleLog()">✕</button>
  </div>
  <div class="alg-list" id="alg-list"></div>
</div>

<!-- MAIN BOX -->
<div class="box">
  <div class="logo">VentSim</div>
  <div class="tagline">Clinical Simulation · ICU Nursing · UM 2026</div>

  <!-- Resume banner -->
  <div class="resume" id="resume-banner">
    <span>Resume as <span class="resume-pid" id="resume-pid"></span>?</span>
    <button class="resume-btn" onclick="doResume()">CONTINUE ▶</button>
  </div>

  <div class="label">Enter your Participant ID</div>

  <input class="inp" type="text" id="pid-inp"
    placeholder="e.g. P001" maxlength="6"
    onkeydown="if(event.key==='Enter') goStudy()"
    oninput="validateFmt(this.value)"
    autocomplete="off" autocorrect="off" spellcheck="false"
    inputmode="text">

  <div class="fmt-hint" id="fmt-hint"></div>

  <button class="btn" id="begin-btn" onclick="goStudy()">
    <span class="spinner" id="spinner"></span>
    <span id="btn-txt">BEGIN STUDY ▶</span>
  </button>

  <div class="err" id="err-msg"></div>

  <div class="info">
    Universiti Malaya · PhD Research Study 2026<br>
    Samir Alnasseri · 24085855
  </div>

  <a class="expert-link" href="ventsim-expert.html">Expert Validator Access →</a>
</div>

<script>
'use strict';
const WORKER   = 'https://ventsim-worker.samir-alnasseri.workers.dev';
const TEST_IDS = ['TEST','DEMO','SAMIR'];

/* ── Session resume ── */
(function(){
  const pid = sessionStorage.getItem('ventsim_pid');
  if(!pid) return;
  document.getElementById('resume-pid').textContent = pid;
  document.getElementById('resume-banner').className = 'resume on';
  document.getElementById('pid-inp').value = pid;
  validateFmt(pid);
})();

function doResume(){
  const pid = sessionStorage.getItem('ventsim_pid');
  const group = sessionStorage.getItem('ventsim_group');
  if(pid && group) redirect(pid, group);
}

/* ── Live format hint ── */
function validateFmt(val){
  const v = val.trim().toUpperCase();
  const hint = document.getElementById('fmt-hint');
  if(!v){ hint.textContent=''; hint.className='fmt-hint'; return; }
  if(TEST_IDS.includes(v)){ hint.textContent='✓ Test ID'; hint.className='fmt-hint ok'; return; }
  const ok = /^(P|PP|EXPERT)\d+$/i.test(v) || /^EXPERT\d{2}$/i.test(v);
  if(ok){ hint.textContent='✓ Valid format'; hint.className='fmt-hint ok'; }
  else   { hint.textContent='Expected format: P001, PP01, EXPERT01'; hint.className='fmt-hint bad'; }
}

/* ── Begin study ── */
async function goStudy(){
  const pid     = document.getElementById('pid-inp').value.trim().toUpperCase();
  const err     = document.getElementById('err-msg');
  const spinner = document.getElementById('spinner');
  const btnTxt  = document.getElementById('btn-txt');
  err.textContent = '';

  if(!pid){ err.textContent = 'Please enter your participant ID.'; return; }

  if(TEST_IDS.includes(pid)){ redirect(pid,'intervention'); return; }

  spinner.style.display = 'block';
  btnTxt.textContent = 'Verifying...';
  document.getElementById('begin-btn').style.opacity = '.8';

  try{
    const r = await fetch(WORKER+'/validate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({pid})
    });
    const j = await r.json();
    spinner.style.display = 'none';
    btnTxt.textContent = 'BEGIN STUDY ▶';
    document.getElementById('begin-btn').style.opacity = '1';

    if(!j.valid){ err.textContent = j.message || 'Invalid participant ID.'; return; }
    redirect(pid, j.group);
  } catch(e){
    spinner.style.display = 'none';
    btnTxt.textContent = 'BEGIN STUDY ▶';
    document.getElementById('begin-btn').style.opacity = '1';
    err.textContent = 'Connection error. Please check your internet and try again.';
  }
}

/* ── Redirect ── */
function redirect(pid, group){
  sessionStorage.setItem('ventsim_pid',   pid);
  sessionStorage.setItem('ventsim_group', group);
  const params = new URLSearchParams(window.location.search);
  const dev = params.get('dev')==='1' ? '&dev=1' : '';
  if(group==='control')     window.location.href='ventsim-control.html?pid='+encodeURIComponent(pid)+dev;
  else if(group==='pilot')  window.location.href='ventsim-pilot.html?pid='+encodeURIComponent(pid)+dev;
  else                      window.location.href='ventsim-intervention.html?pid='+encodeURIComponent(pid)+dev;
}

/* ══════════════════════════════════
   ALARM SYSTEM
   (mirrors ventsim-intervention logic,
    useful if this page is ever kept
    open during a session timeout etc.)
══════════════════════════════════ */
const LOG=[];let logOpen=false;
function addLog(name,val,sev){
  const now=new Date();
  const ts=[now.getHours(),now.getMinutes(),now.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
  LOG.unshift({name,val,sev,ts});renderLog();
}
function renderLog(){
  const list=document.getElementById('alg-list');list.innerHTML='';
  LOG.forEach(e=>{
    const d=document.createElement('div');d.className='alg-entry '+e.sev;
    d.innerHTML='<div class="alg-top"><span class="alg-name">'+e.name+'</span>'
      +'<span class="alg-badge '+e.sev+'">'+e.sev.toUpperCase()+'</span></div>'
      +'<div class="alg-bot"><span class="alg-val">'+e.val+'</span><span class="alg-ts">'+e.ts+'</span></div>';
    list.appendChild(d);
  });
}
function toggleLog(){
  logOpen=!logOpen;
  document.getElementById('alarm-log').className='alarm-log'+(logOpen?' open':'');
}

let _ac=null,_ai=null,_silInt=null,_silSec=0,_esc=0,_alive=false;
function ac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function beep(f,d,v){
  try{const c=ac(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type='square';
  o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
  o.start();o.stop(c.currentTime+d);}catch(e){}
}

function alarmTick(){
  if(!_alive)return;_esc++;
  const banner=document.getElementById('alarm-banner');
  if(_esc>=6){
    banner.className='alarm-banner escalated';
    document.getElementById('alarm-txt').textContent='⚠⚠ ESCALATING ALARM — IMMEDIATE RESPONSE REQUIRED ⚠⚠';
    beep(1600,.1,.4);setTimeout(()=>beep(1300,.1,.32),140);
  } else if(_esc>=3){
    banner.className='alarm-banner warning';
    beep(1400,.1,.35);setTimeout(()=>beep(1100,.1,.28),150);
  } else {
    beep(1200,.1,.3);setTimeout(()=>beep(980,.1,.25),160);
  }
}

function triggerAlarm(name,val){
  if(_ai)return;
  _esc=0;_alive=true;
  document.getElementById('alarm-banner').className='alarm-banner critical';
  document.getElementById('alarm-txt').textContent='⚠  '+name+' — '+val;
  alarmTick();_ai=setInterval(alarmTick,900);
  addLog(name,val,'critical');
}

function silenceAlarm(){
  clearInterval(_ai);_ai=null;clearInterval(_silInt);
  _alive=false;_esc=0;_silSec=120;
  const banner=document.getElementById('alarm-banner');
  banner.className='alarm-banner silenced';
  document.getElementById('alarm-txt').textContent='⏸  ALARM SILENCED — monitoring continues';
  const cd=document.getElementById('sil-cd');cd.style.display='inline';
  addLog('Silenced by operator','2 min silence','silenced');
  _silInt=setInterval(()=>{
    _silSec--;
    cd.textContent=String(Math.floor(_silSec/60)).padStart(2,'0')+':'+String(_silSec%60).padStart(2,'0');
    if(_silSec<=0){
      clearInterval(_silInt);cd.style.display='none';
      document.getElementById('alarm-txt').textContent='⚠  ALARM REINSTATED';
      _esc=0;_alive=true;_ai=setInterval(alarmTick,900);
    }
  },1000);
}

/* Example: trigger a session-timeout alarm after 25 min idle on this page */
let _idle=0;
document.addEventListener('mousemove',()=>{_idle=0;});
document.addEventListener('keydown',()=>{_idle=0;});
setInterval(()=>{
  _idle++;
  if(_idle===25*60) triggerAlarm('SESSION TIMEOUT WARNING','No activity for 25 minutes');
},1000);
</script>
</body>
</html>
